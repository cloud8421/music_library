[tools]
"uv" = "latest"
"pipx:mpremote" = "latest"
"pipx:pimoroni-emulator" = "latest"

[tasks.presto]
run = '''
mpremote fs cp main.py :main.py
mpremote reset
'''

[tasks.poc]
run = '''
mpremote fs cp poc.py :main.py
mpremote reset
'''

[tasks.emulator]
run = 'pimoroni-emulator --device presto main.py'

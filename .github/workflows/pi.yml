name: Pi Extensions

on:
  push:
    paths:
      - .pi/extensions/**
      - mise.toml
  pull_request:
    paths:
      - .pi/extensions/**
      - mise.toml
  workflow_dispatch:

jobs:
  test:
    name: Test pi extensions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
        with:
          install_args: "node"

      - name: Test sensitive-file-guard
        run: |
          npm ci --prefix .pi/extensions/sensitive-file-guard
          npm test --prefix .pi/extensions/sensitive-file-guard

      - name: Test s3-browser
        run: |
          npm ci --prefix .pi/extensions/s3-browser
          npm test --prefix .pi/extensions/s3-browser

name: Pi Extensions

on:
  push:
    paths:
      - .pi/extensions/**
      - mise.toml
  pull_request:
    paths:
      - .pi/extensions/**
      - mise.toml
  workflow_dispatch:

jobs:
  test:
    name: Test pi extensions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: "node"

      - name: Test sensitive-file-guard
        run: |
          npm ci --prefix .pi/extensions/sensitive-file-guard
          npm test --prefix .pi/extensions/sensitive-file-guard

      - name: Test s3-browser
        run: |
          npm ci --prefix .pi/extensions/s3-browser
          npm test --prefix .pi/extensions/s3-browser

      - name: Test ci-browser
        run: |
          npm ci --prefix .pi/extensions/ci-browser
          npm test --prefix .pi/extensions/ci-browser

name: Pi Extensions

on:
  push:
    paths:
      - .pi/extensions/**
      - mise.toml
  pull_request:
    paths:
      - .pi/extensions/**
      - mise.toml
  workflow_dispatch:

jobs:
  test:
    name: Test pi extensions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: jdx/mise-action@5083fe46898c414b2475087cc79da59e7da859e8  # v2.1.11
        with:
          install_args: "node"

      - name: Test sensitive-file-guard
        run: |
          npm ci --prefix .pi/extensions/sensitive-file-guard
          npm test --prefix .pi/extensions/sensitive-file-guard

      - name: Test s3-browser
        run: |
          npm ci --prefix .pi/extensions/s3-browser
          npm test --prefix .pi/extensions/s3-browser
